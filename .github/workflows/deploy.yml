name: Deploy Hugo

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.146.5"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Setup Pagefind
        run: npx pagefind --site public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Upload OSS artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: ./public

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-oss:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site

      - name: Deploy to OSS via S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          AWS_DEFAULT_REGION: oss-cn-wuhan-lr
        run: |
          aws configure set default.s3.addressing_style path
          aws s3 sync . s3://easyuner-blog/ \
            --endpoint-url https://oss-cn-wuhan-lr.aliyuncs.com \
            --delete \
            --cache-control "public,max-age=3600"
