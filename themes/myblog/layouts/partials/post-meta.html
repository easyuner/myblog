<div class="post-meta">
  <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
  {{ with .Params.categories }}
    {{ range . }}<a href="{{ "categories" | relURL }}/{{ . | urlize }}/">{{ . }}</a>{{ end }}
  {{ end }}
  {{ with .Params.tags }}
    {{ range . }}<a href="{{ "tags" | relURL }}/{{ . | urlize }}/">#{{ . }}</a>{{ end }}
  {{ end }}
</div>
