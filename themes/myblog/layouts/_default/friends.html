{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <ul class="friends-list">
    {{ range .Site.Data.friends }}
      <li>
        <a href="{{ .url }}" target="_blank" rel="noopener">{{ .name }}</a>
        {{ with .description }}<span style="color: var(--muted); font-size: 0.9rem;"> — {{ . }}</span>{{ end }}
      </li>
    {{ end }}
  </ul>
{{ end }}
