{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ range (.Site.RegularPages.GroupByDate "2006") }}
    <div class="archive-year">{{ .Key }}</div>
    {{ range .Pages }}
      <div class="archive-item">
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "01-02" }}</time>
      </div>
    {{ end }}
  {{ end }}
{{ end }}
